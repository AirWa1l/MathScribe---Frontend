# Blueprint de Render (Infraestructura como Código) — MathScribe Web
#
# Publica la SPA como sitio estático. El build de Vite genera `dist`, que Render
# sirve desde su CDN; la regla de reescritura devuelve `index.html` en cualquier
# ruta para que funcione el enrutamiento del lado del cliente.

services:
  - type: web
    name: mathscribe-web
    runtime: static
    plan: free
    region: oregon
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    autoDeploy: true
    envVars:
      # URL pública de la API. Vite la incrusta en el bundle durante el build,
      # por lo que un cambio aquí exige reconstruir el sitio.
      - key: VITE_API_BASE_URL
        value: https://mathscribe-api.onrender.com/api/v1
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
