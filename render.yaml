# Blueprint de Render (Infraestructura como Código) — MathScribe Web
#
# Publica la SPA como sitio estático. El build de Vite genera `dist`, que Render
# sirve desde su CDN; la regla de reescritura devuelve `index.html` en cualquier
# ruta para que funcione el enrutamiento del lado del cliente.

services:
  - type: web
    name: mathscribe-web
    runtime: static
    # Un sitio estático no declara `plan` ni `region`: no se ejecuta sobre una
    # instancia ni se aloja en una región concreta, se sirve desde la red de
    # distribución global de Render. Ambas propiedades sí aplican, en cambio, al
    # servicio web del backend.
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    autoDeploy: true
    envVars:
      # URL pública de la API. Vite la incrusta en el bundle durante el build,
      # por lo que un cambio aquí exige reconstruir el sitio.
      - key: VITE_API_BASE_URL
        value: https://mathscribe-api.onrender.com/api/v1
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin

      # Los archivos de `assets` llevan un hash del contenido en el nombre: si
      # cambian, cambia el nombre. Se pueden cachear indefinidamente.
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable

      # `index.html` es el índice que apunta a esos archivos y conserva el mismo
      # nombre entre versiones. Si el navegador lo cachea, tras un despliegue
      # seguirá pidiendo los bundles anteriores, que ya no existen, y la página
      # quedará en blanco con errores 404.
      - path: /index.html
        name: Cache-Control
        value: no-cache, max-age=0, must-revalidate
